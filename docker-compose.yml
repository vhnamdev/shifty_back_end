version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shifty_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}       
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-shifty_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shifty-network

  mongo:
    image: mongo:7.0
    container_name: shifty_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - shifty-network


  redis:
    image: redis:7-alpine
    container_name: shifty_redis
    restart: always

    command: redis-server --requirepass ${REDIS_PASSWORD:-password} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - shifty-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: shifty_qdrant
    restart: always
    ports:
      - "6333:6333" 
      - "6334:6334" 
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - shifty-network


volumes:
  postgres_data:
  mongo_data:
  redis_data:
  qdrant_storage:


networks:
  shifty-network:
    driver: bridge