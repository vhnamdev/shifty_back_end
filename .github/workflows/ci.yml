jobs:
  build-and-test:
    name: Build & Check Code
    runs-on: ubuntu-latest 

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'
        cache: true


    - name: Install dependencies
      run: |
        go mod download


    - name: Build Application
      run: go build -v ./...


    - name: Run Unit Tests
      run: go test -v -race ./...
